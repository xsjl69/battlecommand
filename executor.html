<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刀手面板 - BattleCommand</title>
  <style>
    :root {
      --bg: #f5f7fa; --text: #1f2937; --card-bg: #ffffff;
      --card-border: #e5e7eb; --accent: #ef4444; --accent-light: #fef2f2;
      --shadow: 0 1px 3px rgba(0,0,0,.08); --radius: 12px;
    }
    [data-theme="dark"] {
      --bg: #111827; --text: #f3f4f6; --card-bg: #1f2937;
      --card-border: #374151; --accent-light: #450a0a;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    [data-theme="eye"] {
      --bg: #e8f0e3; --text: #3d4a33; --card-bg: #f7faf3;
      --card-border: #c8d6ba; --accent-light: #fdf2ec;
      --shadow: 0 1px 3px rgba(80,100,60,.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      transition: background 0.25s, color 0.25s; padding: 16px;
    }

    /* 主题切换 */
    .theme-bar { position: fixed; top: 16px; right: 16px; display: flex; gap: 6px; z-index: 100; }
    .theme-btn, .logout-btn {
      width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--card-border);
      background: var(--card-bg); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.25s; box-shadow: var(--shadow);
    }
    .theme-btn:hover, .logout-btn:hover { transform: scale(1.1); }
    .theme-btn:hover { border-color: var(--accent); }
    .logout-btn:hover { border-color: #ef4444; }
    .theme-btn.active { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent); }
    .theme-btn svg, .logout-btn svg { width: 20px; height: 20px; fill: none; stroke: var(--text); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logout-btn svg { stroke: #ef4444; }

    /* 顶部图标 */
    .header-icon { margin-top: 60px; margin-bottom: 4px; }
    .header-icon svg { width: 48px; height: 48px; display: block; margin: 0 auto; }
    .role-label { text-align: center; font-size: 0.875rem; color: var(--accent); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
    .header-line { width: 60px; height: 2px; margin: 0 auto 32px; background: var(--accent); border-radius: 1px; }

    /* 卡片 */
    .card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      width: 100%; max-width: 420px; padding: 28px 24px; margin-bottom: 16px;
    }
    .card h2 { font-size: 1rem; margin-bottom: 16px; }

    .btn {
      width: 100%; padding: 12px; font-size: 0.9375rem; font-weight: 600; border: none;
      border-radius: 8px; cursor: pointer; color: #fff; background: var(--accent);
      margin-top: 12px; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }

    /* Toast */
    .toast-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex;
      align-items: center; justify-content: center; z-index: 200;
      animation: fadeIn 0.3s ease;
    }
    .toast-box {
      background: var(--card-bg); border-radius: 16px; padding: 40px 36px;
      text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,.25);
      max-width: 320px; width: 90%;
      animation: popIn 0.35s ease;
    }
    .toast-icon svg { width: 56px; height: 56px; display: block; margin: 0 auto 16px; }
    .toast-box h2 { font-size: 1.25rem; margin-bottom: 4px; }
    .toast-box p { font-size: 1rem; color: var(--accent); font-weight: 600; }
    .toast-box .hint { font-size: 0.75rem; color: #9ca3af; margin-top: 20px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

    @media (max-width: 480px) {
      .theme-btn, .logout-btn { width: 34px; height: 34px; }
      .theme-btn svg, .logout-btn svg { width: 18px; height: 18px; }
      .header-icon svg { width: 56px; height: 56px; }
    }
  </style>
</head>
<body>

  <!-- Toast 弹框 -->
  <div class="toast-overlay" id="toast">
    <div class="toast-box">
      <div class="toast-icon">
        <!-- 剑图标 -->
        <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 17.5L3 6V3h3l11.5 11.5"/>
          <path d="M13 19l6-6"/>
          <line x1="16" y1="16" x2="20" y2="20"/>
          <line x1="8" y1="8" x2="10" y2="10"/>
        </svg>
      </div>
      <h2 id="toastGreeting"></h2>
      <p>你现在是无敌的刀手</p>
      <div class="hint">点击任意位置关闭</div>
    </div>
  </div>

  <!-- 主题切换 -->
  <div class="theme-bar">
    <button class="theme-btn active" data-theme="light" title="日间"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    <button class="theme-btn" data-theme="dark" title="夜间"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
    <button class="theme-btn" data-theme="eye" title="护眼"><svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
    <button class="logout-btn" id="logoutBtn" title="退出登录" style="margin-left:8px;">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>

  <!-- 顶部图标 -->
  <div class="header-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.5 17.5L3 6V3h3l11.5 11.5"/>
      <path d="M13 19l6-6"/>
      <line x1="16" y1="16" x2="20" y2="20"/>
      <line x1="8" y1="8" x2="10" y2="10"/>
    </svg>
  </div>
  <div class="role-label">executor · 刀手</div>
  <div class="header-line"></div>

  <!-- 内容区 -->
  <div class="card">
    <h2>欢迎回来，<span id="username">--</span></h2>
    <p style="color: var(--text-secondary, #6b7280); font-size: 0.875rem; line-height: 1.6;">
      刀手面板功能即将上线，敬请期待。
    </p>
  </div>

  <script>
    // ========== 主题 ==========
    const savedTheme = localStorage.getItem('bc-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.querySelectorAll('.theme-btn').forEach(b => {
      if (b.dataset.theme === savedTheme) b.classList.add('active');
      b.addEventListener('click', () => {
        const t = b.dataset.theme;
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('bc-theme', t);
        document.querySelectorAll('.theme-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      });
    });

    // ========== 鉴权 ==========
    const token = localStorage.getItem('bc-token');
    const role = localStorage.getItem('bc-role');
    if (!token || role !== 'executor') { window.location.href = '/'; }

    // 获取用户名
    fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.json())
      .then(data => {
        if (data.username) {
          document.getElementById('username').textContent = data.username;
          document.getElementById('toastGreeting').textContent = 'Hello ' + data.username;
        }
      })
      .catch(() => {});

    // ========== Toast ==========
    const toast = document.getElementById('toast');
    toast.addEventListener('click', () => { toast.style.display = 'none'; });
    setTimeout(() => { toast.style.display = 'none'; }, 3000);

    // ========== 退出 ==========
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('bc-token');
      localStorage.removeItem('bc-role');
      window.location.href = '/';
    });
  </script>
</body>
</html>
