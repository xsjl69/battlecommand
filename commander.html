<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>指挥面板 - BattleCommand</title>
  <style>
    :root {
      --bg: #f5f7fa; --text: #1f2937; --card-bg: #ffffff;
      --card-border: #e5e7eb; --accent: #3b82f6; --accent-light: #eff6ff;
      --shadow: 0 1px 3px rgba(0,0,0,.08); --radius: 12px;
      --msg-self: #eff6ff; --msg-other: #f3f4f6;
    }
    [data-theme="dark"] {
      --bg: #111827; --text: #f3f4f6; --card-bg: #1f2937;
      --card-border: #374151; --accent-light: #1e3a5f;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
      --msg-self: #1e3a5f; --msg-other: #1f2937;
    }
    [data-theme="eye"] {
      --bg: #e8f0e3; --text: #3d4a33; --card-bg: #f7faf3;
      --card-border: #c8d6ba; --accent-light: #eaf5e3;
      --shadow: 0 1px 3px rgba(80,100,60,.1);
      --msg-self: #eaf5e3; --msg-other: #e8f0e3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; height: 100dvh; display: flex; flex-direction: column;
      transition: background 0.25s, color 0.25s; overflow: hidden;
    }

    .theme-bar { position: fixed; top: 12px; right: 12px; display: flex; gap: 6px; z-index: 100; }
    .theme-btn, .logout-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--card-border);
      background: var(--card-bg); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.25s; box-shadow: var(--shadow);
    }
    .theme-btn:hover, .logout-btn:hover { transform: scale(1.1); }
    .theme-btn:hover { border-color: var(--accent); }
    .logout-btn:hover { border-color: #ef4444; }
    .theme-btn.active { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent); }
    .theme-btn svg, .logout-btn svg { width: 18px; height: 18px; fill: none; stroke: var(--text); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logout-btn svg { stroke: #ef4444; }

    /* 顶部置顶栏 */
    .pinned-bar {
      flex-shrink: 0; margin-top: 48px; padding: 10px 16px; background: var(--accent-light);
      border-bottom: 2px solid var(--accent); text-align: center;
      font-size: 1rem; font-weight: 600; color: var(--accent);
      min-height: 40px; display: flex; align-items: center; justify-content: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pinned-bar .pin-icon {
      display: inline-block; width: 14px; height: 14px; margin-right: 6px; flex-shrink: 0;
    }

    /* 功能按钮 */
    .func-btns { display: flex; gap: 6px; padding: 0 12px 8px; }
    .func-btn {
      padding: 6px 14px; border: 1px solid var(--card-border); border-radius: 14px;
      background: var(--card-bg); color: var(--text); font-size: 0.85rem;
      cursor: pointer; transition: all 0.2s;
    }
    .func-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* 聊天区 */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      position: relative; display: flex; flex-direction: column; gap: 8px;
    }
    .chat-watermark {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 0; opacity: 0.06;
    }
    .chat-watermark svg { width: min(240px, 60vw); height: min(240px, 60vw); }

    /* 消息气泡 */
    .msg-row { position: relative; z-index: 1; display: flex; flex-direction: column; max-width: 85%; }
    .msg-row.self { align-self: flex-end; align-items: flex-end; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; }
    .msg-sender {
      font-size: 0.7rem; color: var(--accent); font-weight: 600; margin-bottom: 2px; padding: 0 8px;
    }
    .msg-bubble {
      padding: 8px 14px; border-radius: 16px; font-size: 0.9rem; line-height: 1.5;
      word-break: break-word;
    }
    .msg-row.self .msg-bubble {
      background: var(--accent); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.other .msg-bubble {
      background: var(--msg-other); color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg-row.self .msg-sender { display: none; }
    .msg-empty {
      position: relative; z-index: 1; text-align: center; color: #9ca3af;
      font-size: 0.85rem; margin-top: 60px;
    }

    /* 底部输入区 */
    .input-bar {
      flex-shrink: 0; padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: var(--card-bg);
      border-top: 1px solid var(--card-border); display: flex; flex-direction: column; gap: 8px;
    }
    .btn-row { display: flex; gap: 8px; justify-content: flex-end; }
    .input-bar input {
      flex: 1; padding: 10px 14px; border: 1px solid var(--card-border);
      border-radius: 20px; font-size: 16px; outline: none;
      background: var(--bg); color: var(--text); transition: border-color 0.2s;
    }
    .input-bar input:focus { border-color: var(--accent); }
    .send-btn, .pin-btn {
      padding: 10px 16px; border: none; border-radius: 20px;
      color: #fff; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
    }
    .send-btn { background: var(--accent); }
    .pin-btn { background: #f59e0b; }
    .send-btn:hover, .pin-btn:hover { opacity: 0.85; }
    .send-btn:disabled, .pin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 480px) {
      .theme-btn, .logout-btn { width: 32px; height: 32px; }
      .theme-btn svg, .logout-btn svg { width: 16px; height: 16px; }
      .send-btn, .pin-btn { padding: 10px 12px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <div class="theme-bar">
    <button class="theme-btn active" data-theme="light" title="日间"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    <button class="theme-btn" data-theme="dark" title="夜间"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
    <button class="theme-btn" data-theme="eye" title="护眼"><svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
    <button class="logout-btn" id="logoutBtn" title="退出登录" style="margin-left:8px;">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>

  <div class="pinned-bar" id="pinnedBar">
    <svg class="pin-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>
    </svg>
    <span id="pinnedText">暂无置顶消息</span>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="chat-watermark">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 15s1-1 4-1 5 1 8 0 4-2 4-2V3s-1 1-4 1-5-1-8 0-4 2-4 2z"/>
        <line x1="4" y1="22" x2="4" y2="15"/>
      </svg>
    </div>
  </div>

  <div class="input-bar">
    <input type="text" id="msgInput" placeholder="输入消息..." maxlength="500" autocomplete="off" />
    <div class="btn-row"><button class="send-btn" id="sendBtn">发送</button><button class="pin-btn" id="pinBtn">置顶</button></div>
  </div>

  <div class="func-btns">
    <button class="func-btn" onclick="alert('功能开发中')">进度</button>
    <button class="func-btn" onclick="alert('功能开发中')">排刀</button>
    <button class="func-btn" onclick="alert('功能开发中')">号表</button>
  </div>

  <script>
    const savedTheme = localStorage.getItem('bc-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.querySelectorAll('.theme-btn').forEach(b => {
      if (b.dataset.theme === savedTheme) b.classList.add('active');
      b.addEventListener('click', () => {
        const t = b.dataset.theme;
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('bc-theme', t);
        document.querySelectorAll('.theme-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      });
    });

    const token = localStorage.getItem('bc-token');
    const role = localStorage.getItem('bc-role');
    if (!token || role !== 'commander') { window.location.href = '/'; }

    let currentUserId = null;

    fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.json())
      .then(data => { if (data.id) currentUserId = data.id; })
      .then(() => { loadPinned(); loadMessages(); })
      .catch(() => {})
      .finally(() => { startPolling(); });

    function apiGet(url) {
      return fetch(url, { headers: { 'Authorization': 'Bearer ' + token } }).then(r => r.json());
    }
    function apiPost(url, body) {
      return fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(body)
      }).then(r => r.json());
    }

    function loadPinned() {
      apiGet('/api/chat/pinned').then(data => {
        const el = document.getElementById('pinnedText');
        el.textContent = (data && data.content) ? data.content : '暂无置顶消息';
      }).catch(() => {});
    }

    const chatArea = document.getElementById('chatArea');
    let knownMessageIds = new Set();
    let pollTimer = null;

    function isAtBottom() {
      return chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 50;
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(pollMessages, 3000);
    }

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    function pollMessages() {
      loadPinned();
      apiGet('/api/chat/messages').then(messages => {
        if (!messages || messages.length === 0) return;
        const wasAtBottom = isAtBottom();
        const emptyEl = chatArea.querySelector('.msg-empty');
        if (emptyEl) emptyEl.remove();

        messages.forEach(msg => {
          if (knownMessageIds.has(msg.id)) return;
          knownMessageIds.add(msg.id);
          const isSelf = msg.sender_id === currentUserId;
          const div = document.createElement('div');
          div.className = 'msg-row ' + (isSelf ? 'self' : 'other');
          const senderLabel = isSelf ? '我' : (msg.sender_name || '用户');
          div.innerHTML = `<div class="msg-sender">${escapeHtml(senderLabel)}</div><div class="msg-bubble">${escapeHtml(msg.content)}</div>`;
          chatArea.appendChild(div);
        });

        if (wasAtBottom) {
          chatArea.scrollTop = chatArea.scrollHeight;
        }
      }).catch(() => {});
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopPolling();
      else startPolling();
    });

    function loadMessages() {
      apiGet('/api/chat/messages').then(messages => {
        const watermark = chatArea.querySelector('.chat-watermark');
        chatArea.innerHTML = '';
        if (watermark) chatArea.appendChild(watermark);
        knownMessageIds.clear();

        if (!messages || messages.length === 0) {
          chatArea.insertAdjacentHTML('beforeend', '<div class="msg-empty">暂无聊天记录，发送第一条消息吧</div>');
          return;
        }

        messages.forEach(msg => {
          knownMessageIds.add(msg.id);
          const isSelf = msg.sender_id === currentUserId;
          const div = document.createElement('div');
          div.className = 'msg-row ' + (isSelf ? 'self' : 'other');
          const senderLabel = isSelf ? '我' : (msg.sender_name || '用户');
          div.innerHTML = `<div class="msg-sender">${escapeHtml(senderLabel)}</div><div class="msg-bubble">${escapeHtml(msg.content)}</div>`;
          chatArea.appendChild(div);
        });

        chatArea.scrollTop = chatArea.scrollHeight;
      }).catch(() => {});
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const pinBtn = document.getElementById('pinBtn');

    function sendMessage(isPinned) {
      const content = msgInput.value.trim();
      if (!content) return;
      const url = isPinned ? '/api/chat/pin' : '/api/chat/send';
      sendBtn.disabled = true;
      pinBtn.disabled = true;
      apiPost(url, { content }).then(res => {
        if (res.success) {
          msgInput.value = '';
          loadMessages();
          loadPinned();
        } else {
          alert(res.error || '发送失败');
        }
      }).catch(() => alert('网络错误')).finally(() => { sendBtn.disabled = false; pinBtn.disabled = false; });
    }

    sendBtn.addEventListener('click', () => sendMessage(false));
    pinBtn.addEventListener('click', () => sendMessage(true));
    msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(false); });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('bc-token');
      localStorage.removeItem('bc-role');
      window.location.href = '/';
    });
  </script>
</body>
</html>
