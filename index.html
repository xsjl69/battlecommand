<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BattleCommand</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --card-bg: #ffffff;
      --card-border: #e5e7eb;
      --text: #1f2937;
      --text-secondary: #6b7280;
      --input-bg: #f9fafb;
      --input-border: #d1d5db;
      --input-focus: #3b82f6;
      --btn-primary: #3b82f6;
      --btn-primary-hover: #2563eb;
      --btn-disabled: #93c5fd;
      --link: #3b82f6;
      --divider: #e5e7eb;
      --error-bg: #fef2f2;
      --error-text: #dc2626;
      --error-border: #fecaca;
      --success-bg: #f0fdf4;
      --success-text: #16a34a;
      --success-border: #bbf7d0;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 25px rgba(0,0,0,.1);
      --radius: 12px;
      --transition: 0.25s ease;
    }
    [data-theme="dark"] {
      --bg: #111827;
      --card-bg: #1f2937;
      --card-border: #374151;
      --text: #f3f4f6;
      --text-secondary: #9ca3af;
      --input-bg: #374151;
      --input-border: #4b5563;
      --input-focus: #60a5fa;
      --btn-primary: #3b82f6;
      --btn-primary-hover: #2563eb;
      --btn-disabled: #1e40af;
      --link: #60a5fa;
      --divider: #374151;
      --error-bg: #450a0a;
      --error-text: #fca5a5;
      --error-border: #7f1d1d;
      --success-bg: #052e16;
      --success-text: #86efac;
      --success-border: #14532d;
      --shadow: 0 1px 3px rgba(0,0,0,.3);
      --shadow-lg: 0 10px 25px rgba(0,0,0,.4);
    }
    [data-theme="eye"] {
      --bg: #e8f0e3;
      --card-bg: #f7faf3;
      --card-border: #c8d6ba;
      --text: #3d4a33;
      --text-secondary: #7a8b6e;
      --input-bg: #f0f5eb;
      --input-border: #bcc9ae;
      --input-focus: #6b8f55;
      --btn-primary: #5a8a3c;
      --btn-primary-hover: #4a7030;
      --btn-disabled: #a3c493;
      --link: #5a8a3c;
      --divider: #c8d6ba;
      --error-bg: #fdf2ec;
      --error-text: #c0392b;
      --error-border: #f5c6b3;
      --success-bg: #eaf5e3;
      --success-text: #3d7a28;
      --success-border: #b8d9a3;
      --shadow: 0 1px 3px rgba(80,100,60,.1);
      --shadow-lg: 0 10px 25px rgba(80,100,60,.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), color var(--transition);
      padding: 16px;
    }

    /* ---------- theme switcher ---------- */
    .theme-bar {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 6px;
      z-index: 100;
    }
    .theme-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 2px solid var(--card-border);
      background: var(--card-bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      box-shadow: var(--shadow);
    }
    .theme-btn:hover { transform: scale(1.1); border-color: var(--input-focus); }
    .theme-btn.active { border-color: var(--btn-primary); box-shadow: 0 0 0 3px color-mix(in srgb, var(--btn-primary) 25%, transparent); }
    .theme-btn svg { width: 20px; height: 20px; fill: none; stroke: var(--text); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ---------- card ---------- */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 400px;
      padding: 36px 32px;
      transition: background var(--transition), border var(--transition), box-shadow var(--transition);
    }
    .card h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .card .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-bottom: 28px;
    }

    /* ---------- form ---------- */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      font-size: 0.9375rem;
      border: 1.5px solid var(--input-border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border var(--transition), box-shadow var(--transition);
    }
    .form-group input:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--input-focus) 20%, transparent);
    }
    .form-group input::placeholder { color: var(--text-secondary); opacity: 0.6; }

    .role-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 18px;
      background: color-mix(in srgb, var(--btn-primary) 12%, transparent);
      color: var(--btn-primary);
    }

    .btn {
      width: 100%;
      padding: 12px;
      font-size: 0.9375rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background var(--transition), opacity var(--transition);
      color: #fff;
      background: var(--btn-primary);
    }
    .btn:hover { background: var(--btn-primary-hover); }
    .btn:disabled { background: var(--btn-disabled); cursor: not-allowed; }
    .btn:active { transform: scale(0.98); }

    .switch-hint {
      text-align: center;
      margin-top: 20px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }
    .switch-hint a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .switch-hint a:hover { text-decoration: underline; }

    .divider {
      border: none;
      border-top: 1px solid var(--divider);
      margin: 10px 0 0;
    }

    /* ---------- message ---------- */
    .msg {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.8125rem;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }
    .msg.error {
      display: block;
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid var(--error-border);
    }
    .msg.success {
      display: block;
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid var(--success-border);
    }

    /* ---------- after login ---------- */
    .dashboard { display: none; }
    .dashboard .info { margin-bottom: 16px; font-size: 0.875rem; color: var(--text-secondary); text-align: center; }
    .dashboard .info strong { color: var(--text); }

    /* ---------- responsive ---------- */
    @media (max-width: 480px) {
      .card { padding: 24px 20px; max-width: 100%; }
      .card h1 { font-size: 1.25rem; }
      .theme-bar { top: 10px; right: 10px; }
      .theme-btn { width: 34px; height: 34px; }
      .theme-btn svg { width: 18px; height: 18px; }
    }
  </style>
</head>
<body>

  <!-- 主题切换 -->
  <div class="theme-bar">
    <button class="theme-btn active" data-theme="light" title="日间模式" aria-label="日间模式">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <button class="theme-btn" data-theme="dark" title="夜间模式" aria-label="夜间模式">
      <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="theme-btn" data-theme="eye" title="护眼模式" aria-label="护眼模式">
      <svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
  </div>

  <!-- 登录卡片 -->
  <div class="card" id="loginCard">
    <h1>BattleCommand</h1>
    <p class="subtitle">登录你的账号</p>
    <div class="msg" id="loginMsg"></div>
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="loginUser">用户名</label>
        <input type="text" id="loginUser" placeholder="请输入用户名" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="loginPass">密码</label>
        <input type="password" id="loginPass" placeholder="请输入密码" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" id="loginBtn">登 录</button>
    </form>
    <hr class="divider">
    <p class="switch-hint">还没有账号？<a id="toRegister">立即注册</a></p>
  </div>

  <!-- 注册卡片 -->
  <div class="card" id="registerCard" style="display:none;">
    <h1>BattleCommand</h1>
    <p class="subtitle">注册新账号</p>
    <div class="role-badge">默认注册：刀手（executor）</div>
    <div class="msg" id="registerMsg"></div>
    <form id="registerForm" autocomplete="off">
      <div class="form-group">
        <label for="regUser">用户名</label>
        <input type="text" id="regUser" placeholder="请输入用户名" required autocomplete="off">
      </div>
      <div class="form-group">
        <label for="regPass">密码</label>
        <input type="password" id="regPass" placeholder="请输入密码" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn" id="registerBtn">注 册</button>
    </form>
    <hr class="divider">
    <p class="switch-hint">已有账号？<a id="toLogin">返回登录</a></p>
  </div>

  <script>
    const API = '/api';

    // ========== 主题切换 ==========
    const themeBtns = document.querySelectorAll('.theme-btn');
    const savedTheme = localStorage.getItem('bc-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeBtns.forEach(b => {
      if (b.dataset.theme === savedTheme) b.classList.add('active');
      else b.classList.remove('active');
    });
    themeBtns.forEach(b => {
      b.addEventListener('click', () => {
        const t = b.dataset.theme;
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('bc-theme', t);
        themeBtns.forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      });
    });

    // ========== 页面切换 ==========
    const loginCard = document.getElementById('loginCard');
    const registerCard = document.getElementById('registerCard');
    document.getElementById('toRegister').addEventListener('click', () => {
      loginCard.style.display = 'none';
      registerCard.style.display = '';
      clearMsg('registerMsg');
    });
    document.getElementById('toLogin').addEventListener('click', () => {
      registerCard.style.display = 'none';
      loginCard.style.display = '';
      clearMsg('loginMsg');
    });

    // ========== 消息 ==========
    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'msg ' + type;
    }
    function clearMsg(id) {
      const el = document.getElementById(id);
      el.textContent = '';
      el.className = 'msg';
    }

    // ========== 登录 ==========
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = '登录中...';
      clearMsg('loginMsg');

      try {
        const res = await fetch(API + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('loginUser').value.trim(),
            password: document.getElementById('loginPass').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '登录失败');
        showMsg('loginMsg', `登录成功！角色：${data.role === 'executor' ? '刀手' : '指挥'}`, 'success');
        localStorage.setItem('bc-token', data.token);
        localStorage.setItem('bc-role', data.role);
        if (data.role === 'executor') {
          window.location.href = '/executor.html';
        } else {
          window.location.href = '/commander.html';
        }
      } catch (err) {
        showMsg('loginMsg', err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    });

    // ========== 注册 ==========
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.textContent = '注册中...';
      clearMsg('registerMsg');

      try {
        const res = await fetch(API + '/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('regUser').value.trim(),
            password: document.getElementById('regPass').value,
            role: 'executor',  // 固定只能注册刀手
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '注册失败');
        showMsg('registerMsg', `注册成功！用户名：${data.username}`, 'success');
        document.getElementById('regUser').value = '';
        document.getElementById('regPass').value = '';
        setTimeout(() => {
          registerCard.style.display = 'none';
          loginCard.style.display = '';
          clearMsg('registerMsg');
          document.getElementById('loginUser').value = data.username;
        }, 1000);
      } catch (err) {
        showMsg('registerMsg', err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '注 册';
      }
    });
  </script>
</body>
</html>
